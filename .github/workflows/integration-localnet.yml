name: Integration (localnet)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    name: "Integration (${{ matrix.package }})"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts-sdks
    strategy:
      matrix:
        package:
          - sui-stack-messaging
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ts-sdks/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ts-sdks/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run integration tests
        run: pnpm --filter @mysten/${{ matrix.package }} test:integration